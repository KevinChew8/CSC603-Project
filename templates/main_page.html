<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suggestify</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/main_page.css')}}">
</head>

<!-- Incorporating a header to make it look more professional -->
<header class="app_header">
    <div class="header_content">
        <h1 class="logo"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo"> MOODSHELF </h1>
        <nav class="nav_links">
            <a href="#">Sign In</a>
        </nav>
    </div>
</header>

<!-- Making animated text to make things pretty -->
<body>
    <div class="hero">
    <div class="helpText">
        <span id="animatedText"></span>
    </div>
</div>

<div class="chat_box">
    <!--<div class="chat_bot_title">Suggestify</div> -->

    <ul class="chat_bot_body">
        <li class="chat_bot_in">
        </li>
    </ul>

    <div class="chat_bot_input">
        <textarea id="user_input" placeholder="Try: comedy horror, chill music, story games..."></textarea>
        <button id="send_btn">Send</button>
    </div>

     <!-- Making a seperate area for the  -->
    <div class="results_panel">
        <div class="results_grid" id="results_grid"></div>
    </div>
</div>

<script>
const sendBtn = document.getElementById("send_btn");
const inputBox = document.getElementById("user_input");
const chatBody = document.querySelector(".chat_bot_body");

sendBtn.addEventListener("click", async () => {
    const userText = inputBox.value.trim();
    if (!userText) return;

    document.body.classList.add("chat-active");
    // Show user message
    chatBody.innerHTML += `
        <li class="chat_bot_out">
            <p>${userText}</p>
        </li>
    `;

    inputBox.value = "";

    // Loading message
    chatBody.innerHTML += `
        <li class="chat_bot_in" id="loading">
            <p>Thinking...</p>
        </li>
    `;

    chatBody.scrollTop = chatBody.scrollHeight;

    // Call backend
    const response = await fetch("/recommend", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query: userText })
    });

    const data = await response.json();

    // Remove loading
    document.getElementById("loading").remove();

    // Show results
    let botHTML = `<li class="chat_bot_in"><div class="results_grid">`;

    data.forEach(item => {
        const searchQuery = encodeURIComponent(item.title);

        botHTML += `
            <div class="card" onclick="window.open('https://www.google.com/search?q=${searchQuery}', '_blank')">
                ${
                    item.poster 
                    ? `<img src="${item.poster}">`
                    : `<div class="no-image">No Image</div>`
                }
                <div class="card_info">
                    <span class="media_type">[${item.type.toUpperCase()}]</span>
                    <p>${item.title}</p>
                </div>
            </div>
        `;
    });

    botHTML += `</div></li>`;

    chatBody.innerHTML += botHTML;

    chatBody.scrollTop = chatBody.scrollHeight;
});

// Optional: press Enter to send
inputBox.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
    }
});

// Just some animations for a more professional app

const phrases = [
  "What do you feel like exploring?",
  "What would you like to watch? Read?",
  "Want to discover something new?",
  "What are you in the mood for?"
];

const el = document.getElementById("animatedText");

let index = 0;

function showNextText() {
  if (!el) return;

  el.classList.remove("fade-in");
  el.classList.add("fade-out");

  setTimeout(() => {
    el.textContent = phrases[index];
    index = (index + 1) % phrases.length;

    el.classList.remove("fade-out");
    el.classList.add("fade-in");
  }, 200);
}

// init
if (el) {
  el.textContent = phrases[0];
  el.classList.add("fade-in");

  setInterval(showNextText, 3000);
}
</script>

</body>
</html>
