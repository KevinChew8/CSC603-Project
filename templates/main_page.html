<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suggestify</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/main_page.css')}}">
</head>
<body>

<!-- ⭐ FAVORITES SIDEBAR -->
<div id="favorites_panel" class="favorites_panel hidden">
    <div class="favorites_header">⭐ Favorites</div>
    <div id="favorites_list" class="favorites_list"></div>
</div>

<button id="toggle_favs_btn">⭐</button>

<!-- MAIN CHAT -->
<div class="chat_box">
    <div class="chat_bot_title">Suggestify</div>

    <ul class="chat_bot_body">
        <li class="chat_bot_in">
            <p>What do you feel like exploring? (movies, books, games)</p>
        </li>
    </ul>

    <div class="chat_bot_input">
        <textarea id="user_input" placeholder="Try: comedy horror, story games, dystopian books..."></textarea>
        <button id="send_btn">Send</button>
    </div>
</div>

<script>
// -----------------------------
// FAVORITES
// -----------------------------
function getFavorites() {
    return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function saveFavorites(favs) {
    localStorage.setItem("favorites", JSON.stringify(favs));
}

function toggleFavorite(item, buttonEl) {
    let favs = getFavorites();

    const index = favs.findIndex(f => f.title === item.title);

    let isNowSaved;

    if (index > -1) {
        favs.splice(index, 1);
        isNowSaved = false;
    } else {
        favs.push(item);
        isNowSaved = true;
    }

    saveFavorites(favs);

    buttonEl.innerText = isNowSaved ? "⭐ Saved" : "⭐ Save";

    renderFavorites();
}

function removeFavorite(title) {
    let favs = getFavorites();
    favs = favs.filter(f => f.title !== title);

    saveFavorites(favs);

    renderFavorites();
}

// -----------------------------
// SIDEBAR
// -----------------------------
const favPanel = document.getElementById("favorites_panel");
const favBtn = document.getElementById("toggle_favs_btn");

favBtn.addEventListener("click", () => {
    favPanel.classList.toggle("hidden");
    renderFavorites();
});

function renderFavorites() {
    const container = document.getElementById("favorites_list");
    const favs = getFavorites();

    container.innerHTML = "";

    if (favs.length === 0) {
        container.innerHTML = "<p>No favorites yet</p>";
        return;
    }

    favs.forEach(item => {
        const searchQuery = encodeURIComponent(item.title);

        container.innerHTML += `
            <div class="favorite_item">

                <div onclick="window.open('https://www.google.com/search?q=${searchQuery}', '_blank')">
                    ${
                        item.poster
                        ? `<img src="${item.poster}">`
                        : `<div class="no-image small">N/A</div>`
                    }
                </div>

                <p>${item.title}</p>

                <button onclick='event.stopPropagation(); removeFavorite("${item.title}")'>
                    ❌
                </button>

            </div>
        `;
    });
}

// -----------------------------
// MAIN LOGIC
// -----------------------------
const sendBtn = document.getElementById("send_btn");
const inputBox = document.getElementById("user_input");
const chatBody = document.querySelector(".chat_bot_body");

sendBtn.addEventListener("click", async () => {
    const userText = inputBox.value.trim();
    if (!userText) return;

    chatBody.innerHTML += `
        <li class="chat_bot_out">
            <p>${userText}</p>
        </li>
    `;

    inputBox.value = "";

    chatBody.innerHTML += `
        <li class="chat_bot_in" id="loading">
            <p>Thinking...</p>
        </li>
    `;

    chatBody.scrollTop = chatBody.scrollHeight;

    const response = await fetch("/recommend", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query: userText })
    });

    const data = await response.json();
    document.getElementById("loading").remove();

    let botHTML = `<li class="chat_bot_in"><div class="results_grid">`;

    data.forEach(item => {
        const searchQuery = encodeURIComponent(item.title);
        const favs = getFavorites();
        const isFav = favs.some(f => f.title === item.title);

        botHTML += `
            <div class="card">

                <div onclick="window.open('https://www.google.com/search?q=${searchQuery}', '_blank')">
                    ${
                        item.poster 
                        ? `<img src="${item.poster}">`
                        : `<div class="no-image">No Image</div>`
                    }
                </div>

                <div class="card_info">
                    <span class="media_type">[${item.type.toUpperCase()}]</span>
                    <p>${item.title}</p>

                    ${item.rating ? `<div class="rating">⭐ ${item.rating}</div>` : ""}

                    <button onclick='event.stopPropagation(); toggleFavorite(${JSON.stringify(item)}, this)'>
                        ${isFav ? "⭐ Saved" : "⭐ Save"}
                    </button>
                </div>

            </div>
        `;
    });

    botHTML += `</div></li>`;

    chatBody.innerHTML += botHTML;
    chatBody.scrollTop = chatBody.scrollHeight;
});

// Enter key
inputBox.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
    }
});
</script>

</body>
</html>
